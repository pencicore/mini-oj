<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新增比赛 — Mini OJ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
  </head>
  <body data-page="contest-create">
    <header class="site-header">
      <div class="nav-inner">
        <a href="index.html" class="logo">Mini OJ</a>
        <nav class="nav-links">
          <a href="index.html">题库</a>
          <a href="history.html">提交历史</a>
          <a href="contests.html">比赛</a>
          <span id="nav-admin-slot"></span>
          <span id="nav-auth">
            <a href="login.html">登录</a>
            <a href="register.html" class="btn-nav">注册</a>
          </span>
        </nav>
      </div>
    </header>

    <main class="main-edit">
      <a class="back-link" href="contest-admin.html">返回比赛管理</a>

      <div id="admin-warn" class="admin-warn" style="display: none"></div>

      <section
        class="detail-card edit-card-problem"
        style="max-width: 1120px; margin: 0 auto"
      >
        <h1 class="edit-card-heading">新增比赛</h1>
        <p class="page-desc" style="margin: -0.5rem 0 1.25rem; font-size: 0.875rem">
          设置开始、结束与封榜时间；题目 ID 用英文逗号分隔，可为空。
        </p>
        <form id="contest-create-form">
          <div class="form-row-inline">
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-title">标题</label>
              <input id="contest-title" name="title" type="text" required maxlength="200" placeholder="例如：春季练习赛" />
            </div>
          </div>
          <div class="form-row-inline">
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-start">开始时间</label>
              <input id="contest-start" name="startTime" type="datetime-local" required />
            </div>
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-end">结束时间</label>
              <input id="contest-end" name="endTime" type="datetime-local" required />
            </div>
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-freeze">封榜时间（可选）</label>
              <input id="contest-freeze" name="freezeTime" type="datetime-local" />
            </div>
          </div>
          <div class="form-group">
            <label for="contest-problems">题目 ID 列表（可选）</label>
            <input
              id="contest-problems"
              name="problemIds"
              type="text"
              placeholder="例如：1, 2, 3"
              autocomplete="off"
            />
          </div>
          <div id="contest-form-msg" class="form-msg" style="display: none" aria-live="polite"></div>
          <div class="contest-create-actions">
            <a href="contest-admin.html" class="contest-create-cancel">取消</a>
            <button type="submit" class="btn-submit-code">创建比赛</button>
          </div>
        </form>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/site.js"></script>
    <script src="js/contest-create.js"></script>
  </body>
</html>
