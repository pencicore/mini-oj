<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新增比赛 — Mini OJ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/common.css" />
  </head>
  <body data-page="contest-create">
    <header class="site-header">
      <div class="nav-inner">
        <a href="index.html" class="logo">Mini OJ</a>
        <nav class="nav-links">
          <a href="index.html">题库</a>
          <a href="history.html">提交历史</a>
          <a href="contests.html">比赛</a>
          <span id="nav-admin-slot"></span>
          <span id="nav-auth">
            <a href="login.html">登录</a>
            <a href="register.html" class="btn-nav">注册</a>
          </span>
        </nav>
      </div>
    </header>

    <main class="main-edit">
      <a class="back-link" href="contest-admin.html">返回比赛管理</a>

      <div id="admin-warn" class="admin-warn" style="display: none"></div>

      <section
        class="detail-card edit-card-problem"
        style="max-width: 1120px; margin: 0 auto"
      >
        <h1 class="edit-card-heading">新增比赛</h1>
        <p class="page-desc" style="margin: -0.5rem 0 1.25rem; font-size: 0.875rem">
          设置开始、结束与封榜时间；题目从题库中勾选，顺序对应比赛中的 A、B、C…
        </p>
        <form id="contest-create-form">
          <div class="form-row-inline">
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-title">标题</label>
              <input id="contest-title" name="title" type="text" required maxlength="200" placeholder="例如：春季练习赛" />
            </div>
          </div>
          <div class="form-row-inline">
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-start">开始时间</label>
              <input id="contest-start" name="startTime" type="datetime-local" required />
            </div>
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-end">结束时间</label>
              <input id="contest-end" name="endTime" type="datetime-local" required />
            </div>
            <div class="form-group" style="flex: 1 1 200px">
              <label for="contest-freeze">封榜时间（可选）</label>
              <input id="contest-freeze" name="freezeTime" type="datetime-local" />
            </div>
          </div>
          <div class="form-group contest-problem-field">
            <span class="form-label-block">比赛题目（可选）</span>
            <div class="contest-problem-dropdown" id="contest-problem-dropdown">
              <button
                type="button"
                class="contest-problem-dd-trigger"
                id="contest-problem-dd-trigger"
                aria-expanded="false"
                aria-controls="contest-problem-dd-panel"
                aria-haspopup="listbox"
              >
                <span class="contest-problem-dd-trigger-text" id="contest-problem-dd-trigger-text">加载中…</span>
                <span class="contest-problem-dd-chevron" aria-hidden="true"></span>
              </button>
              <div
                class="contest-problem-dd-panel"
                id="contest-problem-dd-panel"
                role="listbox"
                aria-hidden="true"
              >
                <div class="contest-problem-dd-search">
                  <input
                    type="search"
                    id="contest-problem-filter"
                    placeholder="搜索题目标题或编号…"
                    autocomplete="off"
                    aria-label="搜索题目"
                  />
                </div>
                <div id="contest-problem-list" class="contest-problem-list">
                  <div class="loading">
                    <span class="loading-spinner" aria-hidden="true"></span>
                    加载题目列表…
                  </div>
                </div>
                <div class="contest-problem-dd-footer">
                  <span class="contest-problem-dd-hint">勾选加入比赛，顺序见下方列表</span>
                  <button type="button" class="contest-problem-dd-done" id="contest-problem-dd-done">
                    完成
                  </button>
                </div>
              </div>
            </div>
            <p class="problem-examples-hint">点击上方栏展开题库；已选题目可在下方调整 A/B/C 顺序。</p>
            <div class="contest-problem-selected-wrap">
              <span class="contest-problem-selected-label">已选题目</span>
              <ol id="contest-problem-selected" class="contest-problem-selected"></ol>
            </div>
          </div>
          <div id="contest-form-msg" class="form-msg" style="display: none" aria-live="polite"></div>
          <div class="contest-create-actions">
            <a href="contest-admin.html" class="contest-create-cancel">取消</a>
            <button type="submit" class="btn-submit-code">创建比赛</button>
          </div>
        </form>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/site.js"></script>
    <script src="js/contest-create.js"></script>
  </body>
</html>
